<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="100%" height="100%">
  <defs>
    <linearGradient id="clojureGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="rustGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- For standalone mark, we can increase the glow a bit for aesthetic impact -->
    <filter id="intenseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#8B5CF6" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#EF4444" flood-opacity="0.25" />
    </filter>

    <mask id="holes2">
      <rect x="-50" y="-50" width="400" height="400" fill="white" />
      <circle cx="20"  cy="30"  r="6" fill="black" />
      <circle cx="180" cy="30"  r="6" fill="black" />
      <circle cx="60"  cy="30"  r="6" fill="black" />
      <circle cx="40"  cy="140" r="6" fill="black" />
      <circle cx="60"  cy="240" r="6" fill="black" />
      <circle cx="170" cy="240" r="6" fill="black" />
    </mask>
  </defs>

  <!-- Translating (20, 20) places the mark nicely inside 240x280 box -->
  <g transform="translate(20, 20)" filter="url(#intenseGlow)">
    <g mask="url(#holes2)">
      <path d="M 60,30 C 30,100 30,170 60,240" stroke="url(#clojureGrad2)" stroke-width="28" stroke-linecap="round" fill="none" />
      <path d="M 20,30 L 180,30" stroke="url(#clojureGrad2)" stroke-width="28" stroke-linecap="round" fill="none" />
      <path d="M 60,30 C 200,30 200,140 40,140 C 110,140 140,180 170,240" stroke="url(#rustGrad2)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>
</svg>
