<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" width="100%" height="100%">
  <defs>
    <linearGradient id="clojureGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="rustGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <linearGradient id="textWave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>

    <filter id="intenseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#8B5CF6" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#EF4444" flood-opacity="0.25" />
    </filter>

    <mask id="holes2">
      <rect x="-50" y="-50" width="800" height="400" fill="white" />
      <circle cx="20"  cy="30"  r="6" fill="black" />
      <circle cx="180" cy="30"  r="6" fill="black" />
      <circle cx="60"  cy="30"  r="6" fill="black" />
      <circle cx="40"  cy="140" r="6" fill="black" />
      <circle cx="60"  cy="240" r="6" fill="black" />
      <circle cx="170" cy="240" r="6" fill="black" />
    </mask>
  </defs>

  <g transform="translate(30, 5)" filter="url(#intenseGlow)">
    <g mask="url(#holes2)">
      <path d="M 60,30 C 30,100 30,170 60,240" stroke="url(#clojureGrad2)" stroke-width="28" stroke-linecap="round" fill="none" />
      <path d="M 20,30 L 180,30" stroke="url(#clojureGrad2)" stroke-width="28" stroke-linecap="round" fill="none" />
      <path d="M 60,30 C 200,30 200,140 40,140 C 110,140 140,180 170,240" stroke="url(#rustGrad2)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>

  <g transform="translate(250, 0)">
    <text x="130" y="140" text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="130" fill="url(#textWave)" letter-spacing="-4">rasa</text>
    
    <!-- Phonetic spelling moved below and perfectly centered using text-anchor -->
    <text x="130" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="300" font-size="42" fill="#8B5CF6" letter-spacing="12">/ rəsə /</text>
  </g>
</svg>
