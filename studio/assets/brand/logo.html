<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasa Brand Assets</title>
    <!-- Using the scalable SVG mark directly as the favicon -->
    <link rel="icon" type="image/svg+xml" href="mark.svg">
    <style>
        body {
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            background-color: #0d1117;
            background-image: radial-gradient(circle at 50% 0%, #1a1b26 0%, #0d1117 100%);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #F46624, #7E56C2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            margin: 0;
            color: #8b949e;
            font-size: 1.1rem;
        }
        .logo-container {
            width: 100%;
            max-width: 800px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            backdrop-filter: blur(10px);
            background-image: 
              linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%), 
              linear-gradient(-45deg, rgba(255,255,255,0.02) 25%, transparent 25%), 
              linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.02) 75%), 
              linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.02) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .logo-container::before {
            content: attr(data-label);
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5881D8;
            font-weight: 600;
        }
        img {
            display: block;
            width: 100%;
            max-width: 600px;
            height: auto;
        }
        .mark-img {
            max-width: 200px;
        }
        .glass-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(126, 86, 194, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            right: -100px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Rasa Brand Assets</h1>
        <p>Official scalable SVG assets and favicon preview.</p>
    </div>

    <!-- The Full Logo -->
    <div class="logo-container" data-label="Full Logo (logo.svg)">
        <div class="glass-orb" style="left: -100px; background: radial-gradient(circle, rgba(88, 129, 216, 0.15) 0%, rgba(0,0,0,0) 70%);"></div>
        <img src="logo.svg" alt="Rasa Logo">
    </div>

    <!-- The Standalone Mark / Favicon -->
    <div class="logo-container" data-label="Standalone Mark / Favicon (mark.svg)">
        <div class="glass-orb"></div>
        <img src="mark.svg" class="mark-img" alt="Rasa Mark">
    </div>
</body>
</html>
